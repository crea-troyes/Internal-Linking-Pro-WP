name: Bug report
description: Report a reproducible plugin issue
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the observed behavior and the expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Provide the smallest reproducible scenario.
    validations:
      required: true
  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
    validations:
      required: true
  - type: input
    id: wordpress-version
    attributes:
      label: WordPress version
    validations:
      required: true
  - type: input
    id: php-version
    attributes:
      label: PHP version
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add screenshots or logs with sensitive information removed.
